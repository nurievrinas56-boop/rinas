<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <header class="topbar">
            <a href="cabinet.html" class="logo">
                <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
                    <rect width="44" height="44" rx="12" fill="#007bff" />
                    <path d="M13 30L22 17L31 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M10 23L22 10L34 23" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="22" cy="22" r="4" fill="white" />
                </svg>
                <span>Учусь.РФ</span>
            </a>
            <div class="topbar-right">
                <span id="userName">Гость</span>
                <button id="logoutBtn" class="btn-icon" style="display:none;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- ===== В АДМИНКЕ НЕТ ЛИШНИХ ССЫЛОК ===== -->
        <!-- Только заголовок и панель управления -->

        <div class="page-head">
            <h2><i class="fas fa-user-shield"></i> Панель администратора</h2>
            <p>Управление заявками пользователей</p>
        </div>

        <!-- Форма входа в админку -->
        <div id="adminLoginBox">
            <form id="adminLoginForm" class="auth-form">
                <div class="field">
                    <input type="text" id="adminUser" value="Admin26" placeholder="Логин" />
                </div>
                <div class="field">
                    <input type="password" id="adminPass" value="Demo20" placeholder="Пароль" />
                </div>
                <button type="submit" class="btn primary">Войти</button>
                <div id="adminErrorMsg" style="color:#dc3545; font-size:14px; margin-top:8px; text-align:center; font-weight:500; display:none;"></div>
            </form>
        </div>

        <!-- Панель управления (скрыта, пока не залогинился) -->
        <div id="adminPanel" style="display:none;">
            <div class="admin-tools">
                <select id="adminFilter">
                    <option value="all">Все статусы</option>
                    <option value="Новая">Новая</option>
                    <option value="Идет обучение">Идет обучение</option>
                    <option value="Обучение завершено">Обучение завершено</option>
                </select>
                <select id="adminSort">
                    <option value="date-desc">Сначала новые</option>
                    <option value="date-asc">Сначала старые</option>
                    <option value="status">По статусу</option>
                </select>
                <button class="btn danger" id="adminLogoutBtn">Выйти</button>
            </div>
            <div id="adminRequestsList"></div>
            <div class="pagination" id="adminPagination"></div>
        </div>

        <div id="toastContainer"></div>
    </div>

    <script src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мои заявки — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <header class="topbar">
            <a href="cabinet.html" class="logo">
                <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
                    <rect width="44" height="44" rx="12" fill="#007bff" />
                    <path d="M13 30L22 17L31 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M10 23L22 10L34 23" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="22" cy="22" r="4" fill="white" />
                </svg>
                <span>Учусь.РФ</span>
            </a>
            <div class="topbar-right">
                <span id="userName">Гость</span>
                <button id="logoutBtn" class="btn-icon" style="display:none;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <nav class="main-nav">
            <a href="cabinet.html" class="nav-link active"><i class="fas fa-file-alt"></i> Заявки</a>
            <a href="new-request.html" class="nav-link"><i class="fas fa-plus-circle"></i> Новая</a>
            <a href="admin.html" class="nav-link"><i class="fas fa-user-shield"></i> Админ</a>
        </nav>

        <div class="page-head">
            <h2>Мои заявки</h2>
        </div>

        <!-- СЛАЙДЕР -->
        <div class="slider" id="mainSlider">
            <div class="slider-track" id="sliderTrack">
                <div class="slide s1"><i class="fas fa-graduation-cap"></i><span>Повышение квалификации</span></div>
                <div class="slide s2"><i class="fas fa-chalkboard-user"></i><span>Профпереподготовка</span></div>
                <div class="slide s3"><i class="fas fa-hard-hat"></i><span>Охрана труда</span></div>
                <div class="slide s4"><i class="fas fa-certificate"></i><span>Сертификация</span></div>
            </div>
            <button class="slider-btn prev" id="sliderPrev"><i class="fas fa-chevron-left"></i></button>
            <button class="slider-btn next" id="sliderNext"><i class="fas fa-chevron-right"></i></button>
            <div class="slider-dots" id="sliderDots"></div>
        </div>

        <div id="requestsList">
            <div class="empty"><i class="fas fa-inbox"></i><p>У вас пока нет заявок</p></div>
        </div>

        <div id="reviewBlock" style="display:none;">
            <hr />
            <h3>Оставить отзыв</h3>
            <div class="review-box">
                <textarea id="reviewText" placeholder="Напишите отзыв..." rows="3"></textarea>
                <button class="btn success" id="submitReview">Отправить</button>
                <div id="reviewMsg" class="hint"></div>
            </div>
        </div>

        <div id="toastContainer"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="app">
        <header class="topbar">
            <div class="logo">
                <img src="./img/students_corner.png" alt="Учусь.РФ"
                    style="height:44px; width:auto; border-radius:10px;" />
                <span>Учусь.РФ</span>
            </div>
            <div class="topbar-right">
                <span id="userName">Гость</span>
            </div>
        </header>

        <nav class="main-nav" id="mainNav">
            <a href="index.html" class="nav-link active" id="navLogin"><i class="fas fa-sign-in-alt"></i> Вход</a>
            <a href="register.html" class="nav-link" id="navRegister"><i class="fas fa-user-plus"></i> Регистрация</a>
            <a href="cabinet.html" class="nav-link" id="navRequests" style="display:none;"><i
                    class="fas fa-file-alt"></i> Заявки</a>
            <a href="new-request.html" class="nav-link" id="navNewRequest" style="display:none;"><i
                    class="fas fa-plus-circle"></i> Новая</a>
        </nav>

        <div class="page-head">
            <h2>Добро пожаловать</h2>
            <p>Войдите в свой аккаунт</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="field">
                <input type="text" id="loginUser" placeholder="Логин" />
                <div class="error" id="loginError">Неверный логин или пароль</div>
            </div>
            <div class="field">
                <input type="password" id="loginPass" placeholder="Пароль" />
            </div>
            <button type="submit" class="btn primary">Войти</button>
        </form>

        <div class="switch">
            <a href="register.html" class="link">Нет аккаунта? <strong>Регистрация</strong></a>
        </div>

        <div id="toastContainer"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>

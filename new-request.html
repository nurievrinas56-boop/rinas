<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Новая заявка — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="app">
        <header class="topbar">
            <div class="logo">
                <img src="./img/students_corner.png" alt="Учусь.РФ"
                    style="height:44px; width:auto; border-radius:10px;" />
                <span>Учусь.РФ</span>
            </div>
            <div class="topbar-right">
                <span id="userName">Гость</span>
                <button id="logoutBtn" class="btn-icon" style="display:none;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>
        <nav class="main-nav" id="mainNav">
            <a href="cabinet.html" class="nav-link" id="navRequests"><i class="fas fa-file-alt"></i> Заявки</a>
            <a href="new-request.html" class="nav-link active" id="navNewRequest"><i class="fas fa-plus-circle"></i>
                Новая</a>
        </nav>

        <div class="page-head">
            <h2>Новая заявка</h2>
        </div>

        <div id="newRequestFormBlock">
            <form id="newRequestForm" class="auth-form">
                <div class="field">
                    <select id="requestCourse">
                        <option value="">Выберите курс...</option>
                        <option value="Повышение квалификации">Повышение квалификации</option>
                        <option value="Профпереподготовка">Профпереподготовка</option>
                        <option value="Охрана труда">Охрана труда</option>
                        <option value="Пожарная безопасность">Пожарная безопасность</option>
                    </select>
                </div>
                <div class="field">
                    <input type="text" id="requestDate" placeholder="ДД.ММ.ГГГГ" />
                    <div class="hint">Формат: ДД.ММ.ГГГГ</div>
                </div>
                <div class="field">
                    <select id="requestPayment">
                        <option value="">Способ оплаты...</option>
                        <option value="Предоплата по QR-коду">Предоплата по QR-коду</option>
                        <option value="Оплата картой МИР">Оплата картой МИР</option>
                        <option value="Постоплата в офисе">Постоплата в офисе</option>
                    </select>
                </div>
                <button type="submit" class="btn primary">Отправить</button>
            </form>
        </div>

        <div id="newRequestGuest" style="display:none;">
            <div class="empty">
                <i class="fas fa-lock"></i>
                <p>Чтобы оставить заявку, <a href="index.html" class="link">войдите</a> или <a href="register.html"
                        class="link">зарегистрируйтесь</a></p>
            </div>
        </div>

        <div id="toastContainer"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <header class="topbar">
            <a href="index.html" class="logo">
                <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
                    <rect width="44" height="44" rx="12" fill="#007bff" />
                    <path d="M13 30L22 17L31 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M10 23L22 10L34 23" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="22" cy="22" r="4" fill="white" />
                </svg>
                <span>Учусь.РФ</span>
            </a>
            <div class="topbar-right">
                <span id="userName">Гость</span>
            </div>
        </header>

        <nav class="main-nav" id="mainNav">
            <a href="index.html" class="nav-link" id="navLogin"><i class="fas fa-sign-in-alt"></i> Вход</a>
            <a href="register.html" class="nav-link active" id="navRegister"><i class="fas fa-user-plus"></i> Регистрация</a>
            <a href="cabinet.html" class="nav-link" id="navRequests" style="display:none;"><i class="fas fa-file-alt"></i> Заявки</a>
            <a href="new-request.html" class="nav-link" id="navNewRequest" style="display:none;"><i class="fas fa-plus-circle"></i> Новая</a>
        </nav>

        <div class="page-head">
            <h2>Создать аккаунт</h2>
            <p>Заполните форму ниже</p>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="field">
                <input type="text" id="regLogin" placeholder="Логин (латиница, ≥6)" />
                <div class="error" id="regLoginError">Логин ≥6 символов, только латиница и цифры</div>
            </div>
            <div class="field">
                <input type="password" id="regPass" placeholder="Пароль (≥8 символов)" />
                <div class="error" id="regPassError">Пароль должен быть ≥8 символов</div>
            </div>
            <div class="field">
                <input type="text" id="regFio" placeholder="ФИО" />
            </div>
            <div class="field">
                <input type="text" id="regPhone" placeholder="Телефон" />
            </div>
            <div class="field">
                <input type="email" id="regEmail" placeholder="E-mail" />
            </div>
            <button type="submit" class="btn primary">Зарегистрироваться</button>
        </form>

        <div class="switch">
            <a href="index.html" class="link">Уже есть аккаунт? <strong>Войти</strong></a>
        </div>

        <div id="toastContainer"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
